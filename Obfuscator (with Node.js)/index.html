<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Encoder Lab</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    background:#0f172a;
    color:#e2e8f0;
    padding:40px;
    display:flex;
    justify-content:center;
}

.app{
    width:1000px;
    background:#1e293b;
    border-radius:12px;
    padding:30px;
}

h1{
    margin-bottom:20px;
    text-align:center;
}

.tabs{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

.tab{
    flex:1;
    padding:12px;
    border:none;
    background:#334155;
    color:white;
    cursor:pointer;
}

.tab.active{
    background:#2563eb;
}

textarea{
    width:100%;
    height:140px;
    padding:15px;
    background:#0f172a;
    color:white;
    border:none;
    resize:none;
    margin-bottom:20px;
}

.actions{
    display:flex;
    gap:10px;
    margin-bottom:20px;
}

button{
    padding:12px 18px;
    border:none;
    cursor:pointer;
    background:#2563eb;
    color:white;
}

.output{
    background:#0f172a;
    padding:15px;
    min-height:120px;
    margin-bottom:20px;
    word-break:break-word;
}

.history{
    background:#334155;
    padding:15px;
    max-height:200px;
    overflow:auto;
}

.toast{
    position:fixed;
    top:20px;
    right:20px;
    background:#16a34a;
    padding:10px 20px;
    display:none;
}
</style>
</head>

<body>

<div class="app">

<h1>Cyber Encoder Lab</h1>

<div class="tabs">
    <button class="tab active" data-mode="base64">Base64</button>
    <button class="tab" data-mode="caesar">Caesar</button>
    <button class="tab" data-mode="rot13">ROT13</button>
    <button class="tab" data-mode="url">URL</button>
    <button class="tab" data-mode="sha256">SHA256</button>
</div>

<textarea id="input" placeholder="Enter text..."></textarea>

<div class="actions">
    <button id="encodeBtn">Encode</button>
    <button id="decodeBtn">Decode</button>
    <button id="copyBtn">Copy</button>
    <button id="clearBtn">Clear</button>
</div>

<div class="output" id="output"></div>

<h3>History</h3>
<div class="history" id="history"></div>

</div>

<div class="toast" id="toast">Copied</div>

<script>

(() => {

let currentMode = "base64";

const state = {
    history:[]
};

const input = document.getElementById("input");
const output = document.getElementById("output");
const historyBox = document.getElementById("history");

document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {

        document.querySelectorAll(".tab")
            .forEach(t => t.classList.remove("active"));

        tab.classList.add("active");

        currentMode = tab.dataset.mode;
    });
});

function addHistory(action, value){

    state.history.unshift({
        action,
        value,
        time:new Date().toLocaleTimeString()
    });

    if(state.history.length > 8){
        state.history.pop();
    }

    renderHistory();
}

function renderHistory(){

    historyBox.innerHTML = state.history
        .map(item => `
            <div>
                [${item.time}] ${item.action}
            </div>
        `)
        .join("");
}

function toast(message){

    const el = document.getElementById("toast");

    el.innerText = message;
    el.style.display = "block";

    setTimeout(() => {
        el.style.display = "none";
    },1500);
}

function caesarCipher(text, shift){

    return text
        .split("")
        .map(char => {

            let code = char.charCodeAt(0);

            if(code >= 65 && code <= 90){

                return String.fromCharCode(
                    ((code - 65 + shift) % 26) + 65
                );
            }

            if(code >= 97 && code <= 122){

                return String.fromCharCode(
                    ((code - 97 + shift) % 26) + 97
                );
            }

            return char;
        })
        .join("");
}

function rot13(text){
    return caesarCipher(text,13);
}

async function sha256(text){

    const msgBuffer = new TextEncoder().encode(text);

    const hashBuffer =
        await crypto.subtle.digest("SHA-256", msgBuffer);

    const hashArray =
        Array.from(new Uint8Array(hashBuffer));

    return hashArray
        .map(b => b.toString(16).padStart(2,"0"))
        .join("");
}

async function encode(){

    const value = input.value;

    let result = "";

    switch(currentMode){

        case "base64":
            result = btoa(value);
            break;

        case "caesar":
            result = caesarCipher(value,3);
            break;

        case "rot13":
            result = rot13(value);
            break;

        case "url":
            result = encodeURIComponent(value);
            break;

        case "sha256":
            result = await sha256(value);
            break;
    }

    output.innerText = result;

    addHistory("Encode " + currentMode, value);
}

function decode(){

    const value = input.value;

    let result = "";

    switch(currentMode){

        case "base64":
            result = atob(value);
            break;

        case "caesar":
            result = caesarCipher(value,-3);
            break;

        case "rot13":
            result = rot13(value);
            break;

        case "url":
            result = decodeURIComponent(value);
            break;

        case "sha256":
            result = "Cannot reverse SHA256";
            break;
    }

    output.innerText = result;

    addHistory("Decode " + currentMode, value);
}

document
.getElementById("encodeBtn")
.addEventListener("click", encode);

document
.getElementById("decodeBtn")
.addEventListener("click", decode);

document
.getElementById("copyBtn")
.addEventListener("click", async () => {

    await navigator.clipboard
        .writeText(output.innerText);

    toast("Copied");
});

document
.getElementById("clearBtn")
.addEventListener("click", () => {

    input.value = "";
    output.innerText = "";
});

window.addEventListener("keydown", e => {

    if(e.ctrlKey && e.key === "Enter"){
        encode();
    }

});

})();

</script>

</body>
</html>
