<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halaman Uji Obfuscator</title>
  <!-- Komentar ini dipakai untuk menguji penghapusan komentar -->
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --text: #e2e8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 32px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; color: var(--accent); }
    p.sub { font-size: 0.9rem; opacity: 0.7; margin-bottom: 24px; }
    .counter {
      font-size: 3rem;
      font-weight: 700;
      text-align: center;
      margin: 16px 0;
    }
    .row { display: flex; gap: 12px; margin-bottom: 16px; }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: #0f172a;
      transition: transform 0.1s ease, opacity 0.2s ease;
    }
    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.96); }
    button.secondary { background: #475569; color: var(--text); }
    input[type="text"] {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0f172a;
      color: var(--text);
      font-size: 1rem;
      margin-bottom: 12px;
    }
    .message { text-align: center; min-height: 24px; color: var(--accent); font-size: 0.95rem; }
    ul#log { list-style: none; margin-top: 16px; font-size: 0.85rem; opacity: 0.75; }
    ul#log li { padding: 4px 0; border-bottom: 1px solid #334155; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Halaman Uji Obfuscator</h1>
    <p class="sub">Berisi HTML, CSS, dan JavaScript untuk pengujian.</p>

    <div class="counter" id="counter">0</div>

    <div class="row">
      <button id="dec" class="secondary">− Kurang</button>
      <button id="inc">+ Tambah</button>
    </div>

    <input type="text" id="nameInput" placeholder="Ketik namamu..." />
    <button id="greet">Sapa</button>

    <p class="message" id="message"></p>

    <ul id="log"></ul>
  </div>

  <script>
    (function () {
      "use strict";

      var count = 0;
      var counterEl = document.getElementById("counter");
      var messageEl = document.getElementById("message");
      var logEl = document.getElementById("log");

      function addLog(text) {
        var li = document.createElement("li");
        var time = new Date().toLocaleTimeString();
        li.textContent = "[" + time + "] " + text;
        logEl.insertBefore(li, logEl.firstChild);
        while (logEl.children.length > 5) {
          logEl.removeChild(logEl.lastChild);
        }
      }

      function render() {
        counterEl.textContent = count;
        counterEl.style.color = count < 0 ? "#f87171" : "#e2e8f0";
      }

      document.getElementById("inc").addEventListener("click", function () {
        count += 1;
        render();
        addLog("Counter dinaikkan menjadi " + count);
      });

      document.getElementById("dec").addEventListener("click", function () {
        count -= 1;
        render();
        addLog("Counter diturunkan menjadi " + count);
      });

      document.getElementById("greet").addEventListener("click", function () {
        var name = document.getElementById("nameInput").value.trim();
        if (!name) {
          messageEl.textContent = "Masukkan nama dulu, ya!";
          return;
        }
        messageEl.textContent = "Halo, " + name + "! 👋";
        addLog("Menyapa " + name);
      });

      render();
      addLog("Halaman siap diuji.");
    })();
  </script>
</body>
</html>
